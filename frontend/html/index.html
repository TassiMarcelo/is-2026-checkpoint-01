<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamBoard App - Equipo de Desarrollo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            color: #333;
            font-size: 2em;
            font-weight: 700;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .status-indicator.online {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .status-indicator.offline {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.online .status-dot {
            background-color: #28a745;
        }

        .status-indicator.offline .status-dot {
            background-color: #dc3545;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background-color: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
            transition: background-color 0.2s;
        }

        tbody tr:nth-child(even) {
            background-color: #fafafa;
        }

        .nombre {
            font-weight: 600;
            color: #333;
        }

       /*  .feature-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-align: center;
            min-width: 100px;
        }

        .feature-badge.frontend {
            background-color: #cfe2ff;
            color: #084298;
        }

        .feature-badge.backend {
            background-color: #e2e3e5;
            color: #383d41;
        }

        .feature-badge.database {
            background-color: #f8d7da;
            color: #842029;
        } */

        .estado-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 600;
            text-align: center;
        }

        .estado-badge.completado {
            background-color: #d4edda;
            color: #155724;
        }

        .estado-badge.en-progreso {
            background-color: #fff3cd;
            color: #856404;
        }

        .estado-badge.pendiente {
            background-color: #e7d4f5;
            color: #663399;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #dc3545;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.9em;
            }

            .feature-badge {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TeamBoard App</h1>
            <div id="statusIndicator" class="status-indicator offline">
                <span class="status-dot"></span>
                <span id="statusText">Verificando conexión...</span>
            </div>
        </div>

        <h2 style="color: #666; font-size: 1.2em; margin-bottom: 20px;">Integrantes del Equipo</h2>

        <div id="content">
            <div class="loading">Cargando datos del equipo...</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
