services:

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  database:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

volumes:
  db_data:
  portainer_data:

networks:
  teamboard-net:
    driver: bridge